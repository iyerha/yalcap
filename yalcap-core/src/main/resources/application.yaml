spring:
  application:
    name: yalcap-core
  datasource:
    url: jdbc:postgresql://localhost:5432/yalcap
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  threads:
    virtual:
      enabled: true
