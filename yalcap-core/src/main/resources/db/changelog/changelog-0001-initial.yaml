databaseChangeLog:
  - changeSet:
      id: 0001-create-extension
      author: yalcap
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS "pgcrypto";

  - changeSet:
      id: 0012-create-asset-file-table
      author: yalcap
      changes:
        - createTable:
            tableName: asset_file
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: uuidv7()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: asset_key
                  type: varchar(200)
              - column:
                  name: version_number
                  type: integer
              - column:
                  name: storage_ref
                  type: varchar(1024)
              - column:
                  name: mime_type
                  type: varchar(120)
              - column:
                  name: byte_size
                  type: bigint
              - column:
                  name: sha256
                  type: varchar(64)
              - column:
                  name: width
                  type: integer
              - column:
                  name: height
                  type: integer
              - column:
                  name: metadata
                  type: jsonb
              - column:
                  name: tenant_id
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: varchar(100)
        - sql:
            sql: CREATE UNIQUE INDEX IF NOT EXISTS ux_asset_file_key_version ON asset_file (asset_key, version_number);
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_asset_file_key ON asset_file (asset_key);
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_asset_file_tenant ON asset_file (tenant_id);
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_asset_file_metadata_gin ON asset_file USING gin (metadata);
        - sql:
            sql: ALTER TABLE asset_file ENABLE ROW LEVEL SECURITY;
        - sql:
            sql: |
              CREATE POLICY asset_file_tenant_isolation ON asset_file
              USING (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid)
              WITH CHECK (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid);

  - changeSet:
      id: 0013-create-tenant-table
      author: yalcap
      changes:
        - createTable:
            tableName: tenant
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_key
                  type: varchar(120)
              - column:
                  name: name
                  type: varchar(200)
              - column:
                  name: status
                  type: varchar(30)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
        - sql:
            sql: CREATE UNIQUE INDEX IF NOT EXISTS ux_tenant_key ON tenant (tenant_key);
        - sql:
            sql: |
              INSERT INTO tenant (id, tenant_key, name, status)
              VALUES ('00000000-0000-0000-0000-000000000000', 'default', 'Default Tenant', 'ACTIVE')
              ON CONFLICT DO NOTHING;


