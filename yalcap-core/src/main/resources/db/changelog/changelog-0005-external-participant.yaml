databaseChangeLog:
  - changeSet:
      id: 0001-create-external-participant-table
      author: yalcap
      changes:
        - createTable:
            tableName: external_participant
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: uuidv7()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: primary_email
                  type: varchar(320)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(200)
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - sql:
            sql: CREATE UNIQUE INDEX IF NOT EXISTS ux_external_participant_tenant_email ON external_participant (tenant_id, primary_email);
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_external_participant_tenant_id ON external_participant (tenant_id);
        - sql:
            sql: ALTER TABLE external_participant ENABLE ROW LEVEL SECURITY;
        - sql:
            sql: |
              CREATE POLICY external_participant_tenant_isolation ON external_participant
              USING (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid)
              WITH CHECK (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid);