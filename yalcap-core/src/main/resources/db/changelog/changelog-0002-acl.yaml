databaseChangeLog:
  - changeSet:
      id: 0014-create-project-table
      author: yalcap
      changes:
        - createTable:
            tableName: project
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: uuidv7()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: project_key
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(1000)
              - column:
                  name: created_by
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: project
            baseColumnNames: tenant_id
            referencedTableName: tenant
            referencedColumnNames: id
            constraintName: fk_project_tenant
        - sql:
            sql: CREATE UNIQUE INDEX IF NOT EXISTS ux_project_tenant_key ON project (tenant_id, project_key);
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_project_tenant_name ON project (tenant_id, name);
        - sql:
            sql: ALTER TABLE project ENABLE ROW LEVEL SECURITY;
        - sql:
            sql: |
              CREATE POLICY project_tenant_isolation ON project
              USING (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid)
              WITH CHECK (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid);

  - changeSet:
      id: 0015-create-resource-table
      author: yalcap
      changes:
        - createTable:
            tableName: resource
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: uuidv7()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: uuid
              - column:
                  name: resource_type
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: resource_key
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: lifecycle_state
                  type: varchar(40)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: resource
            baseColumnNames: tenant_id
            referencedTableName: tenant
            referencedColumnNames: id
            constraintName: fk_resource_tenant
        - addForeignKeyConstraint:
            baseTableName: resource
            baseColumnNames: project_id
            referencedTableName: project
            referencedColumnNames: id
            constraintName: fk_resource_project
        - sql:
            sql: CREATE UNIQUE INDEX IF NOT EXISTS ux_resource_tenant_type_key ON resource (tenant_id, resource_type, resource_key);
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_resource_tenant_project_type ON resource (tenant_id, project_id, resource_type);
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_resource_tenant_state ON resource (tenant_id, lifecycle_state);
        - sql:
            sql: ALTER TABLE resource ENABLE ROW LEVEL SECURITY;
        - sql:
            sql: |
              CREATE POLICY resource_tenant_isolation ON resource
              USING (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid)
              WITH CHECK (current_setting('app.tenant', true) IS NULL OR tenant_id = current_setting('app.tenant')::uuid);

