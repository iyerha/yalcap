<div id="active-definition" class="active-manifest">
    <h2>Active definition for <span th:text="${definitionKey}">definitionKey</span></h2>

    <div th:if="${publishSuccess}">
        <strong>Published successfully.</strong>
    </div>

    <div th:if="${publishError}">
        <strong th:text="${publishError}">Publish validation failed.</strong>
    </div>

    <div th:if="${activeDefinition == null}">
        <p>No active definition found for this key.</p>
    </div>

    <div th:if="${activeDefinition != null}">
        <p><strong>Version:</strong> <span th:text="${activeDefinition.versionNumber}">1</span></p>
        <p><strong>Created by:</strong> <span th:text="${activeDefinition.createdBy}">creator</span></p>
        <p><strong>Created at:</strong> <span th:text="${activeDefinition.createdAt}">timestamp</span></p>
        <p><strong>Change message:</strong> <span th:text="${activeDefinition.changeMessage}">message</span></p>
        <h3>Definition JSON</h3>
        <pre th:text="${activeDefinition.definition}"></pre>
    </div>
</div>
