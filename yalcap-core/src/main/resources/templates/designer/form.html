<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Form Designer</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/json-logic-js@2.0.5/logic.min.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-controls.js}" src="/js/designer/form/designer-form-controls.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-schema-controls.js}" src="/js/designer/form/designer-form-schema-controls.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-schema.js}" src="/js/designer/form/designer-form-schema.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-properties.js}" src="/js/designer/form/designer-form-properties.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-interactions-core.js}" src="/js/designer/form/designer-form-interactions-core.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-interactions-sortable.js}" src="/js/designer/form/designer-form-interactions-sortable.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-interactions-resize.js}" src="/js/designer/form/designer-form-interactions-resize.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-interactions-impl.js}" src="/js/designer/form/designer-form-interactions-impl.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-interactions.js}" src="/js/designer/form/designer-form-interactions.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-rules-table.js}" src="/js/designer/form/designer-form-rules-table.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-rules-utils.js}" src="/js/designer/form/designer-form-rules-utils.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-rules-compile.js}" src="/js/designer/form/designer-form-rules-compile.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form-rules.js}" src="/js/designer/form/designer-form-rules.js"></script>
    <script defer th:src="@{/js/designer/form/designer-form.js}" src="/js/designer/form/designer-form.js"></script>
    <th:block th:if="${designerJsAssets != null}" th:each="asset : ${designerJsAssets}">
        <script defer th:src="@{${asset}}"></script>
    </th:block>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" />
    <link rel="stylesheet" th:href="@{/css/designer/form/designer-form.css}" href="/css/designer/form/designer-form.css" />
    <link rel="stylesheet" th:href="@{/css/designer/form/designer-form-builder.css}" href="/css/designer/form/designer-form-builder.css" />
    <link rel="stylesheet" th:href="@{/css/designer/form/designer-form-rules.css}" href="/css/designer/form/designer-form-rules.css" />
    <th:block th:if="${designerCssAssets != null}" th:each="asset : ${designerCssAssets}">
        <link rel="stylesheet" th:href="@{${asset}}" />
    </th:block>
</head>
<body>
    <script th:inline="javascript">
        window.tenantId = /*[[${tenantId}]]*/ null;
    </script>
    <div x-data="formDesigner()" x-init="initFromDefinitionJson(); applyTheme(); initSortable()" :data-theme="selectedTheme">
        <h1>Form Designer</h1>
        <p>Design a reusable form definition (data schema + control layout) that can be embedded or referenced by workflow definitions.</p>

        <div class="designer-shell" :class="{ 'menu-collapsed': menuCollapsed }">
            <aside class="designer-menu card" :class="{ 'is-collapsed': menuCollapsed }">
                <div class="designer-menu-header">
                    <h3 x-show="!menuCollapsed" x-cloak>Workspace</h3>
                    <button type="button" class="designer-menu-toggle" @click="toggleMenuCollapsed()" :aria-expanded="(!menuCollapsed).toString()" :title="menuCollapsed ? 'Expand menu' : 'Collapse menu'" :aria-label="menuCollapsed ? 'Expand menu' : 'Collapse menu'">
                        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false" :class="menuCollapsed ? 'chevron-right' : 'chevron-left'">
                            <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                </div>
                <button type="button" class="designer-menu-btn" :class="{ 'is-active': activePage === 'overview' }" @click="setActivePage('overview')" title="Overview">
                    <span class="menu-short">O</span>
                    <span class="menu-label" x-show="!menuCollapsed" x-cloak>Overview</span>
                </button>
                <button type="button" class="designer-menu-btn" :class="{ 'is-active': activePage === 'builder' }" @click="setActivePage('builder')" title="Builder">
                    <span class="menu-short">B</span>
                    <span class="menu-label" x-show="!menuCollapsed" x-cloak>Builder</span>
                </button>
                <button type="button" class="designer-menu-btn" :class="{ 'is-active': activePage === 'rules' }" @click="setActivePage('rules')" title="Rules">
                    <span class="menu-short">R</span>
                    <span class="menu-label" x-show="!menuCollapsed" x-cloak>Rules</span>
                </button>
                <button type="button" class="designer-menu-btn" :class="{ 'is-active': activePage === 'publish' }" @click="setActivePage('publish')" title="Publish">
                    <span class="menu-short">P</span>
                    <span class="menu-label" x-show="!menuCollapsed" x-cloak>Publish</span>
                </button>
                <p class="subtle" x-show="!menuCollapsed" x-cloak>Split by task area so the designer stays navigable even as the form model grows.</p>
            </aside>

            <main class="designer-pages">
                <th:block th:replace="~{designer/form/overview :: page}"></th:block>
                <th:block th:replace="~{designer/form/builder :: page}"></th:block>
                <th:block th:replace="~{designer/form/rules :: page}"></th:block>
                <th:block th:replace="~{designer/form/publish :: page}"></th:block>
            </main>
        </div>
    </div>
</body>
</html>
