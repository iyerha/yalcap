<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="page">
    <section class="card" x-show="activePage === 'rules'" x-cloak x-init="ensureDecisionTables()">
        <h3>Rules</h3>
        <p class="subtle">Matrix decision table. Input columns define Field + Operator. Action columns can be UI toggles, API calls, or derived value expressions.</p>

        <div class="decision-table-tabs">
            <template x-for="table in decisionTables" :key="table.id">
                <button
                    type="button"
                    class="decision-table-tab"
                    :class="{ 'is-active': activeDecisionTableId === table.id }"
                    @click.prevent="selectDecisionTable(table.id)">
                    <span x-text="table.name"></span>
                    <span class="decision-table-tab-meta" x-text="`${table.rules.length} rules`"></span>
                </button>
            </template>
            <button type="button" class="move-inline-btn" @click.prevent="addDecisionTable()">+ Table</button>
            <button type="button" class="remove-inline-btn" title="Remove current table" aria-label="Remove current table" @click.prevent="removeDecisionTable(activeDecisionTableId)" :disabled="decisionTables.length <= 1">
                <svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false">
                    <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <div class="decision-table-settings">
            <label>Description</label>
            <input type="text" x-model="decisionTableDescription" placeholder="What this table covers" />
            <label>Table scope</label>
            <select x-model="decisionTableScope">
                <option value="form">form</option>
                <option value="step">step</option>
            </select>
        </div>

        <template x-if="rules.length === 0">
            <p class="subtle">No rules yet. Add a row to define a condition and action.</p>
        </template>
        <div class="decision-grid-shell" x-show="decisionInputColumns.length > 0 || decisionActionColumns.length > 0 || rules.length > 0" x-cloak>
            <div class="decision-grid-row decision-grid-header" :style="decisionMatrixGridStyle()">
                <div class="decision-grid-cell decision-grid-static-header">
                    <span>Row</span>
                    <button type="button" class="add-inline-btn" title="Add rule row" aria-label="Add rule row" @click.prevent="addRule()">+</button>
                </div>
                <template x-for="(column, inputIdx) in decisionInputColumns" :key="column.id">
                    <div class="decision-grid-cell decision-grid-col-header">
                        <template x-if="inputIdx > 0">
                            <div class="decision-divider-hint">And</div>
                        </template>
                        <div class="decision-grid-col-title-row">
                            <div class="decision-grid-col-title">Input</div>
                            <div class="decision-inline-controls">
                                <button type="button" class="add-inline-btn" title="Insert input column" aria-label="Insert input column" @click.prevent="insertDecisionInputColumnAfter(column.id)">+</button>
                                <button type="button" class="remove-inline-btn decision-col-remove-btn" title="Remove input column" aria-label="Remove input column" @click.prevent="removeDecisionInputColumn(column.id)" :disabled="decisionInputColumns.length <= 1">
                                    <svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false">
                                        <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <select x-model="column.stateKey" title="Control" aria-label="Control">
                            <option value="">Pick control...</option>
                            <template x-for="item in availableStateKeyOptions()" :key="item.key">
                                <option :value="item.key" x-text="`${item.label} (${item.key})`"></option>
                            </template>
                        </select>
                    </div>
                </template>
                <template x-for="(column, actionIdx) in decisionActionColumns" :key="column.id">
                    <div class="decision-grid-cell decision-grid-col-header" :class="{ 'decision-grid-input-action-separator': actionIdx === 0 }">
                        <div class="decision-grid-col-title-row">
                            <div class="decision-grid-col-title">Action</div>
                            <div class="decision-inline-controls">
                                <button type="button" class="add-inline-btn" title="Insert action column" aria-label="Insert action column" @click.prevent="insertDecisionActionColumnAfter(column.id)">+</button>
                                <button type="button" class="remove-inline-btn decision-col-remove-btn" title="Remove action column" aria-label="Remove action column" @click.prevent="removeDecisionActionColumn(column.id)" :disabled="decisionActionColumns.length <= 1">
                                    <svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false">
                                        <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <select x-model="column.kind">
                            <option value="ui">UI</option>
                            <option value="api">API</option>
                            <option value="derive">Derive</option>
                        </select>
                        <template x-if="String(column.kind || 'ui').toLowerCase() === 'ui'">
                            <div class="decision-action-ui-fields">
                                <input x-model="column.target" list="state-key-options" placeholder="applicant.email" />
                                <select x-model="column.property">
                                    <option value="visible">visible</option>
                                    <option value="readable">readable</option>
                                    <option value="writable">writable</option>
                                    <option value="enabled">enabled</option>
                                    <option value="required">required</option>
                                    <option value="collapsed">collapsed</option>
                                </select>
                            </div>
                        </template>
                        <template x-if="String(column.kind || 'ui').toLowerCase() === 'api'">
                            <div class="decision-action-api-fields">
                                <input x-model="column.apiEndpoint" placeholder="/api/check-risk" />
                                <select x-model="column.apiMethod">
                                    <option value="get">GET</option>
                                    <option value="post">POST</option>
                                    <option value="put">PUT</option>
                                    <option value="patch">PATCH</option>
                                    <option value="delete">DELETE</option>
                                </select>
                                <select x-model="column.apiTrigger">
                                    <option value="change">change</option>
                                    <option value="input">input</option>
                                    <option value="blur">blur</option>
                                    <option value="submit">submit</option>
                                    <option value="click">click</option>
                                </select>
                                <input x-model="column.apiTarget" placeholder="#result-target" />
                                <select x-model="column.apiSwap">
                                    <option value="innerHTML">innerHTML</option>
                                    <option value="outerHTML">outerHTML</option>
                                    <option value="beforeend">beforeend</option>
                                    <option value="afterend">afterend</option>
                                </select>
                                <input x-model="column.apiValsTemplate" placeholder='{"amount":"{{data.amount}}"}' />
                            </div>
                        </template>
                        <template x-if="String(column.kind || 'ui').toLowerCase() === 'derive'">
                            <div class="decision-action-ui-fields">
                                <input x-model="column.deriveTarget" list="state-key-options" placeholder="summary.total" />
                                <input x-model="column.deriveExpression" placeholder='{"+": [{"var":"data.base"}, {"var":"data.tax"}]}' />
                            </div>
                        </template>
                    </div>
                </template>
                <div class="decision-grid-cell decision-grid-static-header">Actions</div>
            </div>

            <template x-for="(rule, idx) in rules" :key="idx">
                <div class="decision-grid-row decision-grid-body" :style="decisionMatrixGridStyle()" x-init="ensureRuleRowDefaults(rule)">
                    <div class="decision-grid-cell decision-grid-row-index" x-text="idx + 1"></div>

                    <template x-for="column in decisionInputColumns" :key="column.id">
                        <div class="decision-grid-cell">
                            <div class="decision-input-cell">
                                <select :value="decisionInputOperator(rule, column.id)" @change="setDecisionInputOperator(rule, column.id, $event.target.value)">
                                    <template x-for="op in operatorOptionsForInputColumn(column)" :key="op.value">
                                        <option :value="op.value" x-text="op.label"></option>
                                    </template>
                                </select>
                                <template x-if="inputCellValueInputType(rule, column.id, column) === 'number'">
                                    <input type="number" :value="decisionInputCell(rule, column.id)" @input="setDecisionInputCell(rule, column.id, $event.target.value)" placeholder="0" />
                                </template>
                                <template x-if="inputCellValueInputType(rule, column.id, column) === 'boolean'">
                                    <select :value="decisionInputCell(rule, column.id)" @change="setDecisionInputCell(rule, column.id, $event.target.value)">
                                        <option value="">(blank)</option>
                                        <option value="true">true</option>
                                        <option value="false">false</option>
                                    </select>
                                </template>
                                <template x-if="inputCellValueInputType(rule, column.id, column) === 'text'">
                                    <input :value="decisionInputCell(rule, column.id)" @input="setDecisionInputCell(rule, column.id, $event.target.value)" :placeholder="isSetMembershipOperator(decisionInputOperator(rule, column.id)) ? 'a, b, c' : 'value'" />
                                </template>
                                <template x-if="inputCellValueInputType(rule, column.id, column) === 'none'">
                                    <input value="(n/a)" disabled />
                                </template>
                            </div>
                        </div>
                    </template>

                    <template x-for="(column, actionIdx) in decisionActionColumns" :key="column.id">
                        <div class="decision-grid-cell" :class="{ 'decision-grid-input-action-separator': actionIdx === 0 }">
                            <select :value="decisionActionCell(rule, column.id)" @change="setDecisionActionCell(rule, column.id, $event.target.value)">
                                <option value="">(no action)</option>
                                <option value="true">true</option>
                                <option value="false">false</option>
                            </select>
                        </div>
                    </template>

                    <div class="decision-grid-cell">
                        <div class="row-actions-cell">
                            <div class="decision-inline-controls">
                                <button type="button" class="add-inline-btn" title="Insert rule row" aria-label="Insert rule row" @click.prevent="insertRuleAfter(idx)">+</button>
                                <button type="button" class="remove-inline-btn" title="Remove rule" aria-label="Remove rule" @click.prevent="removeRule(idx)">
                                    <svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false">
                                        <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                    </svg>
                                </button>
                            </div>
                            <details class="rule-advanced-details">
                                <summary>Advanced</summary>
                                <div class="rule-advanced-body">
                                    <label>Match mode for compiled conditions</label>
                                    <select x-model="rule.conditionMatchMode" aria-label="Condition match mode">
                                        <option value="all">all</option>
                                        <option value="any">any</option>
                                    </select>
                                    <label class="checkbox-inline">
                                        <input type="checkbox" x-model="rule.runOnInit" />
                                        Run this rule during server form initialization only
                                    </label>
                                    <label>JSON Logic (optional override)</label>
                                    <textarea rows="3" x-model="rule.whenJsonLogic" placeholder='{"==":[{"var":"workflow.stepId"},"review"]}'></textarea>
                                </div>
                            </details>
                        </div>
                    </div>
                </div>
            </template>
        </div>
        <datalist id="state-key-options">
            <template x-for="item in availableActionTargetOptions()" :key="item.key">
                <option :value="item.key"></option>
            </template>
        </datalist>
        <datalist id="condition-field-options">
            <template x-for="item in availableConditionFieldOptions()" :key="item.key">
                <option :value="item.key"></option>
            </template>
        </datalist>
    </section>
</th:block>
