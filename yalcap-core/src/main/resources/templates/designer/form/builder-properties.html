<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="panel">
    <div class="builder-panel side-panel" :class="{ 'pane-collapsed': propertiesCollapsed }">
        <div class="pane-header">
            <h4 x-show="!propertiesCollapsed" x-cloak>Properties</h4>
            <button type="button" class="pane-toggle-btn" @click="togglePropertiesCollapsed()" :title="propertiesCollapsed ? 'Expand properties pane' : 'Collapse properties pane'" :aria-label="propertiesCollapsed ? 'Expand properties pane' : 'Collapse properties pane'">
                <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false" :class="propertiesCollapsed ? 'chevron-left' : 'chevron-right'">
                    <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </button>
        </div>
        <div x-show="propertiesCollapsed" x-cloak class="subtle">Select a field, then expand this pane to edit properties.</div>
        <div x-show="!propertiesCollapsed" x-cloak>
            <template x-if="!selectedControl"><p class="subtle">Select a control from canvas to edit its properties.</p></template>
            <template x-if="validationErrors.length > 0"><div class="subtle" style="color: #b91c1c; margin-bottom: 8px;"><strong>Validation issues:</strong><ul><template x-for="(err, idx) in validationErrors" :key="idx"><li x-text="err"></li></template></ul></div></template>
            <template x-if="selectedControl">
                <div class="properties-panel">
                    <label>Label</label><input x-model="selectedControl.label" @input="onLabelChanged()" />
                    <template x-if="selectedControl.widget !== 'message'"><div><label>Name</label><input x-model="selectedControl.name" @input="onNameChanged()" /><p class="subtle">Name is auto-generated from label unless you edit it manually. Allowed: letters, digits, _ and $, and it cannot start with a digit.</p></div></template>
                    <label>State key</label><div class="state-key-row"><input x-model="selectedControl.stateKey" @input="syncSelected()" :readonly="!stateKeyEditEnabled" placeholder="applicant.email" /><button type="button" class="state-key-toggle-btn" @click.prevent="toggleStateKeyEdit()" x-text="stateKeyEditEnabled ? 'Lock key' : 'Edit key'"></button></div>
                    <p class="subtle">Stable key used by rules and actions. Runtime-agnostic identifier, not JavaScript.</p>
                    <label>Type</label><select x-model="selectedControl.type" @change="onTypeChanged()"><option value="string">string</option><option value="number">number</option><option value="boolean">boolean</option><option value="array">array</option><option value="null">null</option></select>
                    <label>Widget</label><select x-model="selectedControl.widget" @change="onWidgetChanged()"><option value="text">text</option><option value="number">number</option><option value="textarea">textarea</option><option value="date">date</option><option value="datetime">datetime</option><option value="select">select</option><option value="autocomplete">autocomplete</option><option value="radio">radio</option><option value="checkbox">checkbox</option><option value="booleanCheckbox">booleanCheckbox</option><option value="image">image</option><option value="upload">upload</option><option value="button">button</option><option value="message">message</option><option value="repeat">repeat</option><option value="table">table</option><option value="section">section</option><option value="group">group</option></select>
                    <label class="checkbox-row"><span>Required</span><input type="checkbox" x-model="selectedControl.required" @change="syncSelected()" /></label>
                    <label class="checkbox-row"><span>Visible</span><input type="checkbox" x-model="selectedControl.visible" @change="syncSelected()" /></label>
                    <label class="checkbox-row"><span>Enabled</span><input type="checkbox" x-model="selectedControl.enabled" @change="syncSelected()" /></label>
                    <label>Validation message (optional override)</label><input x-model="selectedControl.validationMessage" @input="syncSelected()" placeholder="Shown when rule fails" />
                    <label>Hint (optional)</label><textarea rows="2" x-model="selectedControl.hint" @input="syncSelected()" placeholder="Short inline hint"></textarea>
                    <label>Help (optional)</label><textarea rows="3" x-model="selectedControl.help" @input="syncSelected()" placeholder="Longer help content"></textarea>
                    <template x-if="selectedControl.widget !== 'message'"><div><label>Placeholder</label><input x-model="selectedControl.placeholder" @input="syncSelected()" /></div></template>
                    <label>Column span (1-12)</label><select x-model.number="selectedControl.colSpan" @change="syncSelected()"><template x-for="col in columnOptions" :key="col"><option :value="col" x-text="col"></option></template></select>
                    <template x-if="isOptionWidget(selectedControl.widget) && !(selectedControl.widget === 'autocomplete' && selectedControl.autocompleteSourceType === 'remote')"><div><label>Options (label and value)</label><div class="option-editor"><template x-for="(opt, idx) in selectedControl.options" :key="idx"><div class="option-row"><input x-model="opt.label" @input="onOptionLabelChanged(idx)" placeholder="Label" /><input x-model="opt.value" @input="onOptionValueChanged(idx)" placeholder="Value" /><button type="button" class="remove-inline-btn" title="Remove option" aria-label="Remove option" @click.prevent="removeOptionRow(idx)"><svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg></button></div></template></div><button type="button" @click.prevent="addOptionRow()">Add option</button></div></template>
                    <template x-if="selectedControl.widget === 'autocomplete'"><div><label>Source type</label><select x-model="selectedControl.autocompleteSourceType" @change="syncSelected()"><option value="static">static</option><option value="remote">remote</option></select><template x-if="selectedControl.autocompleteSourceType === 'remote'"><div><label>Remote URL</label><input x-model="selectedControl.autocompleteSourceUrl" @input="syncSelected()" placeholder="/api/lookups/cities" /><label>Label field</label><input x-model="selectedControl.autocompleteLabelField" @input="syncSelected()" placeholder="label" /><label>Value field</label><input x-model="selectedControl.autocompleteValueField" @input="syncSelected()" placeholder="value" /><label>Search parameter</label><input x-model="selectedControl.autocompleteSearchParam" @input="syncSelected()" placeholder="q" /></div></template></div></template>
                    <template x-if="selectedControl.widget === 'date'"><div><label>Minimum date</label><input type="date" x-model="selectedControl.minDate" @input="syncSelected()" /><label>Maximum date</label><input type="date" x-model="selectedControl.maxDate" @input="syncSelected()" /></div></template>
                    <template x-if="selectedControl.widget === 'datetime'"><div><label>Minimum date & time</label><input type="datetime-local" x-model="selectedControl.minDateTime" @input="syncSelected()" /><label>Maximum date & time</label><input type="datetime-local" x-model="selectedControl.maxDateTime" @input="syncSelected()" /></div></template>
                    <template x-if="selectedControl.widget === 'image'"><div><label>Upload image file</label><input type="file" accept="image/*" @change="uploadImageAsset($event)" /><label>Asset key</label><input x-model="selectedControl.assetKey" @input="syncSelected()" placeholder="hero-banner" /><label>Asset version (optional pin)</label><input type="number" min="1" x-model.number="selectedControl.assetVersion" @input="syncSelected()" /><label>Asset SHA-256</label><input x-model="selectedControl.assetHash" @input="syncSelected()" placeholder="hex hash" /><label>Alt text</label><input x-model="selectedControl.altText" @input="syncSelected()" placeholder="Descriptive alt text" /><label>Object fit</label><select x-model="selectedControl.objectFit" @change="syncSelected()"><option value="contain">contain</option><option value="cover">cover</option><option value="fill">fill</option><option value="none">none</option></select><details><summary>Asset metadata (advanced)</summary><label>Asset version (optional pin)</label><input type="number" min="1" x-model.number="selectedControl.assetVersion" @input="syncSelected()" /><label>Asset SHA-256</label><input x-model="selectedControl.assetHash" @input="syncSelected()" placeholder="hex hash" /><label>Width (px)</label><input type="number" min="0" x-model.number="selectedControl.imageWidth" @input="syncSelected()" /><label>Height (px)</label><input type="number" min="0" x-model.number="selectedControl.imageHeight" @input="syncSelected()" /></details></div></template>
                    <template x-if="selectedControl.widget === 'upload'"><div><label>Accepted types (comma-separated)</label><input x-model="selectedControl.uploadAccept" @input="syncSelected()" placeholder="image/*,.pdf" /><label class="checkbox-row"><span>Allow multiple files</span><input type="checkbox" x-model="selectedControl.uploadAllowMultiple" @change="syncSelected()" /></label><template x-if="selectedControl.uploadAllowMultiple === true"><div><label>Default files (comma-separated references)</label><input :value="Array.isArray(selectedControl.defaultValue) ? selectedControl.defaultValue.join(', ') : ''" @input="selectedControl.defaultValue = ($event.target.value || '').split(',').map(v => v.trim()).filter(Boolean); syncSelected();" placeholder="file-key-1, file-key-2" /></div></template><label>Max file size (bytes, 0 = unlimited)</label><input type="number" min="0" x-model.number="selectedControl.uploadMaxBytes" @input="syncSelected()" /></div></template>
                    <template x-if="selectedControl.widget === 'button'"><div><label>Variant</label><select x-model="selectedControl.buttonVariant" @change="syncSelected()"><option value="primary">primary</option><option value="secondary">secondary</option><option value="danger">danger</option><option value="link">link</option></select><label>Action type</label><select x-model="selectedControl.buttonActionType" @change="syncSelected()"><option value="customEvent">customEvent</option><option value="submit">submit</option><option value="reset">reset</option><option value="navigate">navigate</option><option value="invokeWorkflowAction">invokeWorkflowAction</option></select><label>Action target</label><input x-model="selectedControl.buttonActionTarget" @input="syncSelected()" placeholder="event name, URL, or action key" /><label>Payload (optional JSON/text)</label><textarea rows="3" x-model="selectedControl.buttonPayload" @input="syncSelected()" placeholder='{"source":"designer"}'></textarea><label>Confirm message (optional)</label><input x-model="selectedControl.buttonConfirmMessage" @input="syncSelected()" placeholder="Are you sure?" /><p class="subtle">Button is action-only and does not write to form data.</p></div></template>
                    <template x-if="selectedControl.widget === 'message'"><div><label>Message tone</label><select x-model="selectedControl.messageTone" @change="syncSelected()"><option value="info">info</option><option value="warning">warning</option><option value="error">error</option><option value="success">success</option></select><label>Message title (optional)</label><input x-model="selectedControl.messageTitle" @input="syncSelected()" placeholder="Heads up" /><label>Message body</label><textarea rows="4" x-model="selectedControl.messageBody" @input="syncSelected()" placeholder="Informational text shown to users"></textarea><p class="subtle">Message control is output-only and does not write to form data. Content is rendered as safe markdown.</p></div></template>
                    <template x-if="selectedControl.widget === 'table'"><div><label>Minimum rows</label><input type="number" min="0" x-model.number="selectedControl.tableMinItems" @input="syncSelected()" /><label>Maximum rows (0 = no limit)</label><input type="number" min="0" x-model.number="selectedControl.tableMaxItems" @input="syncSelected()" /><label class="checkbox-row"><span>Allow add rows</span><input type="checkbox" x-model="selectedControl.tableAllowAdd" @change="syncSelected()" /></label><label class="checkbox-row"><span>Allow delete rows</span><input type="checkbox" x-model="selectedControl.tableAllowDelete" @change="syncSelected()" /></label><label class="checkbox-row"><span>Allow reorder rows</span><input type="checkbox" x-model="selectedControl.tableAllowReorder" @change="syncSelected()" /></label><p class="subtle">Manage table columns directly in the selected table preview using + and - controls.</p></div></template>
                    <template x-if="selectedControl.widget === 'repeat'"><div><label>Renderer</label><select x-model="selectedControl.repeatRenderer" @change="syncSelected()"><option value="table">table</option><option value="cards">cards</option></select><label>Minimum rows</label><input type="number" min="0" x-model.number="selectedControl.repeatMinItems" @input="syncSelected()" /><label>Maximum rows (0 = no limit)</label><input type="number" min="0" x-model.number="selectedControl.repeatMaxItems" @input="syncSelected()" /><label class="checkbox-row"><span>Allow add rows</span><input type="checkbox" x-model="selectedControl.repeatAllowAdd" @change="syncSelected()" /></label><label class="checkbox-row"><span>Allow delete rows</span><input type="checkbox" x-model="selectedControl.repeatAllowDelete" @change="syncSelected()" /></label><label class="checkbox-row"><span>Allow reorder rows</span><input type="checkbox" x-model="selectedControl.repeatAllowReorder" @change="syncSelected()" /></label><p class="subtle">Drop controls into the repeat container to define row cells.</p></div></template>
                    <template x-if="selectedControl.widget === 'section'"><div><label>Section description</label><input x-model="selectedControl.sectionDescription" @input="syncSelected()" placeholder="Optional section helper text" /><label class="checkbox-row"><span>Collapsible</span><input type="checkbox" x-model="selectedControl.sectionCollapsible" @change="syncSelected()" /></label><label class="checkbox-row"><span>Default expanded</span><input type="checkbox" x-model="selectedControl.sectionDefaultExpanded" @change="syncSelected()" /></label></div></template>
                    <template x-if="selectedControl.widget === 'group'"><div><label>Group description</label><input x-model="selectedControl.groupDescription" @input="syncSelected()" placeholder="Optional group description" /><p class="subtle">Group writes to an object property in dataSchema using Name.</p></div></template>
                </div>
            </template>
        </div>
    </div>
</th:block>
