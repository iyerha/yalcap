<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="panel">
    <div class="builder-panel canvas-panel">
        <div class="canvas-header-row">
            <h4>Canvas</h4>
            <div class="canvas-header-tools">
                <div class="viewport-switch" role="group" aria-label="Preview viewport size">
                    <button type="button" class="viewport-btn" :class="{ 'is-active': previewViewport === 'desktop' }" @click="setPreviewViewport('desktop')" aria-label="Desktop preview">Desktop</button>
                    <button type="button" class="viewport-btn" :class="{ 'is-active': previewViewport === 'tablet' }" @click="setPreviewViewport('tablet')" aria-label="Tablet preview">Tablet</button>
                    <button type="button" class="viewport-btn" :class="{ 'is-active': previewViewport === 'phone' }" @click="setPreviewViewport('phone')" aria-label="Phone preview">Phone</button>
                </div>
                <div class="canvas-legend subtle" aria-label="Canvas legend">
                    <span class="legend-item"><span class="legend-required" aria-hidden="true">*</span><span class="legend-label">Required</span></span>
                    <span class="legend-item" title="Default value configured. Edit it directly in the control widget."><span class="default-indicator legend-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="10" height="10" focusable="false"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8" /><circle cx="12" cy="12" r="2" fill="currentColor" /></svg></span></span>
                </div>
            </div>
        </div>
        <p class="subtle">WYSIWYG canvas. Controls render close to runtime appearance and can be reordered by drag/drop.</p>
        <p class="subtle" x-text="viewportPreviewHint()"></p>
        <div class="canvas-preview-stage">
            <div class="canvas-preview-frame" :class="`mode-${previewViewport}`">
                <div class="canvas" data-sortable-source="__root__">
                    <template x-if="controls.length === 0"><div class="subtle">Drop controls here to build the form.</div></template>
                    <template x-for="control in controls" :key="control.id">
                        <div class="canvas-item" :class="[(selectedControlId === control.id ? 'active' : ''), (control.required ? 'required' : '')]" :data-control-id="control.id" :style="`grid-column: span ${previewColSpan(control)}`" @click="selectControl(control.id)">
                    <div class="canvas-item-toolbar"><button type="button" class="remove-control-btn" title="Remove control" aria-label="Remove control" @click.stop="removeControl(control.id, $event)"><svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg></button></div>
                    <div class="resize-row"><div class="resize-handle" title="Drag to resize control width" @mousedown.prevent.stop="startResize(control.id, $event)"></div></div>
                    <template x-if="control.required"><div class="required-indicator" aria-label="Required field">* Required</div></template>
                    <template x-if="hasExplicitDefaultValue(control)"><div class="default-indicator" aria-label="Default value configured. Edit it directly in the control widget." title="Default value configured. Edit it directly in the control widget."><svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8" /><circle cx="12" cy="12" r="2" fill="currentColor" /></svg></div></template>
                    <template x-if="control.widget !== 'image'"><div class="preview-label-row"><input class="preview-inline-input preview-label-input" :value="control.label || control.name" @click.stop @input="onCanvasLabelChanged(control.id, $event.target.value)" placeholder="Field label" /><template x-if="control.hint"><details class="preview-tooltip hint-tooltip inline-tooltip" @click.stop><summary aria-label="Show hint" title="Show hint"><span aria-hidden="true">i</span></summary><div class="subtle" x-html="renderRichText(control.hint, control.hintFormat)"></div></details></template></div></template>
                    <template x-if="control.widget === 'text'"><input type="text" :placeholder="control.placeholder || ''" :value="control.defaultValue || ''" @click.stop @input="onCanvasDefaultTextChanged(control.id, $event.target.value)" /></template>
                    <template x-if="control.widget === 'number'"><input type="number" :placeholder="control.placeholder || ''" :value="control.defaultValue ?? ''" @click.stop @input="onCanvasDefaultNumberChanged(control.id, $event.target.value)" /></template>
                    <template x-if="control.widget === 'textarea'"><textarea rows="3" :placeholder="control.placeholder || ''" @click.stop @input="onCanvasDefaultTextChanged(control.id, $event.target.value)" x-text="control.defaultValue || ''"></textarea></template>
                    <template x-if="control.widget === 'date'"><input type="text" data-flatpickr="date" :data-control-id="control.id" :data-min-date="control.minDate || ''" :data-max-date="control.maxDate || ''" :value="control.defaultValue || ''" @click.stop @input="onCanvasDefaultTextChanged(control.id, $event.target.value)" /></template>
                    <template x-if="control.widget === 'datetime'"><input type="text" data-flatpickr="datetime" :data-control-id="control.id" :data-min-date-time="control.minDateTime || ''" :data-max-date-time="control.maxDateTime || ''" :value="control.defaultValue || ''" @click.stop @input="onCanvasDefaultTextChanged(control.id, $event.target.value)" /></template>
                    <template x-if="control.widget === 'select'"><select :value="control.defaultValue || ''" @click.stop @change="onCanvasDefaultTextChanged(control.id, $event.target.value)"><option value="">Select...</option><template x-for="(opt, idx) in (control.options || [])" :key="idx"><option :value="opt.value" x-text="opt.label"></option></template></select></template>
                    <template x-if="control.widget === 'autocomplete'"><div><select data-tom-select="autocomplete" :data-control-id="control.id" :data-source-type="control.autocompleteSourceType || 'static'" :data-source-url="control.autocompleteSourceUrl || ''" :data-label-field="control.autocompleteLabelField || 'label'" :data-value-field="control.autocompleteValueField || 'value'" :data-search-param="control.autocompleteSearchParam || 'q'" @click.stop @change="onCanvasDefaultTextChanged(control.id, $event.target.value)"><option value="">Select...</option><template x-for="(opt, idx) in (control.options || [])" :key="idx"><option :value="opt.value" :selected="control.defaultValue === opt.value" x-text="opt.label"></option></template></select><template x-if="control.autocompleteSourceType === 'remote'"><div class="subtle">Remote source: <span x-text="control.autocompleteSourceUrl || '(not configured)'"></span></div></template></div></template>
                    <template x-if="control.widget === 'radio'"><div class="preview-choice-list"><template x-for="(opt, idx) in (control.options || [])" :key="idx"><label class="preview-inline"><input type="radio" :name="`default-${control.id}`" :value="opt.value" :checked="control.defaultValue === opt.value" @click.stop @change="onCanvasDefaultTextChanged(control.id, opt.value)" /><span x-text="opt.label"></span></label></template></div></template>
                    <template x-if="control.widget === 'checkbox'"><div class="preview-choice-list"><template x-for="(opt, idx) in (control.options || [])" :key="idx"><label class="preview-inline"><input type="checkbox" :value="opt.value" :checked="Array.isArray(control.defaultValue) && control.defaultValue.includes(opt.value)" @click.stop @change="onCanvasDefaultMultiChanged(control.id, opt.value, $event.target.checked)" /><span x-text="opt.label"></span></label></template></div></template>
                    <template x-if="control.widget === 'booleanCheckbox'"><label class="preview-inline"><input type="checkbox" :checked="control.defaultValue === true" @click.stop @change="onCanvasDefaultBooleanChanged(control.id, $event.target.checked)" /><span x-text="control.label || control.name"></span></label></template>
                    <template x-if="control.widget === 'button'"><button type="button" class="preview-trigger-btn" :class="`variant-${control.buttonVariant || 'primary'}`" disabled><span x-text="control.label || 'Trigger'">Trigger</span></button></template>
                    <template x-if="control.widget === 'message'"><div class="preview-message-box" :class="`tone-${control.messageTone || 'info'}`"><template x-if="control.messageTitle"><strong x-text="control.messageTitle"></strong></template><div class="subtle" x-html="renderMessageBody(control) || 'Message text'"></div></div></template>
                    <template x-if="control.widget === 'image'"><div class="preview-image-shell"><input class="preview-inline-input preview-label-input" :value="control.label || 'Image'" @click.stop @input="onCanvasLabelChanged(control.id, $event.target.value)" placeholder="Image label" /><div class="preview-image-placeholder"><strong>Image</strong><div class="subtle" x-text="control.assetVersion > 0 ? ((control.assetKey || 'asset') + ' v' + control.assetVersion) : ((control.assetKey || 'asset') + ' (latest)')"></div><img x-show="control.assetPreviewUrl" :src="control.assetPreviewUrl" :alt="control.altText || control.label || 'Image preview'" class="designer-image-preview" /><input class="preview-inline-input" :value="control.altText || ''" @click.stop @input="onCanvasImageAltChanged(control.id, $event.target.value)" placeholder="Alt text" /></div></div></template>
                    <template x-if="control.widget === 'upload'"><div class="preview-upload-shell"><div class="preview-upload-box"><div class="subtle" x-text="control.label || 'Upload file'"></div><div class="subtle" x-text="control.uploadAccept ? ('Types: ' + control.uploadAccept) : 'All file types'"></div><div class="subtle" x-text="control.uploadAllowMultiple ? 'Multiple files allowed' : 'Single file'"></div><input class="preview-inline-input" :value="control.uploadAllowMultiple ? (Array.isArray(control.defaultValue) ? control.defaultValue.join(', ') : '') : (control.defaultValue || '')" @click.stop @input="onCanvasUploadDefaultChanged(control.id, $event.target.value, control.uploadAllowMultiple)" :placeholder="control.uploadAllowMultiple ? 'file-key-1, file-key-2' : 'File reference'" /></div></div></template>
                    <template x-if="control.widget === 'table'"><div><template x-if="selectedControlId === control.id"><div class="table-column-actions" @click.stop><button type="button" class="table-col-icon-btn" title="Add column" aria-label="Add column" @click.stop="addTableColumnOnCanvas(control.id)"><svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg></button><button type="button" class="table-col-icon-btn" title="Remove last column" aria-label="Remove last column" :disabled="(control.tableColumns || []).length <= 1" @click.stop="removeLastTableColumnOnCanvas(control.id)"><svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" focusable="false"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg></button></div></template><div class="preview-table-wrap"><table><thead><tr><template x-for="(col, idx) in (control.tableColumns || [])" :key="idx"><th><div x-text="col.title"></div><div class="subtle" x-text="col.type"></div></th></template></tr></thead><tbody><tr><template x-for="(col, idx) in (control.tableColumns || [])" :key="idx"><td x-text="col.type === 'number' ? '0' : (col.type === 'boolean' ? 'false' : '...')"></td></template></tr></tbody></table></div></div></template>
                    <template x-if="control.widget === 'repeat'"><div class="preview-container preview-group"><div class="subtle">Repeat Group</div><div class="subtle" x-text="(control.repeatRenderer || 'table') === 'table' ? 'Renderer: table' : 'Renderer: cards'"></div><div class="subtle" x-text="'Rows: min ' + (control.repeatMinItems || 0) + ', max ' + (control.repeatMaxItems || 0)"></div><div class="nested-dropzone nested-grid" :data-sortable-source="control.id"><template x-if="!control.children || control.children.length === 0"><div class="subtle">Drop controls into this repeat row</div></template><template x-for="child in (control.children || [])" :key="child.id"><div class="nested-runtime-control" :data-control-id="child.id" :class="[(selectedControlId === child.id ? 'active' : ''), (child.required ? 'required' : '')]" :style="`grid-column: span ${previewColSpan(child)}`" @click.stop="selectControl(child.id)"><div class="resize-row"><div class="resize-handle" title="Drag to resize control width" @mousedown.prevent.stop="startResize(child.id, $event)"></div></div><div class="preview-label" x-text="child.label || child.name"></div><div class="subtle" x-text="child.widget"></div></div></template></div></div></template>
                    <template x-if="control.widget === 'section'"><div class="preview-container preview-section"><div class="subtle">Section Container</div><div class="subtle" x-text="control.sectionDescription || 'No section description'"></div><div class="nested-dropzone nested-grid" :data-sortable-source="control.id"><template x-if="!control.children || control.children.length === 0"><div class="subtle">Drop controls into this section</div></template><template x-for="child in (control.children || [])" :key="child.id"><div class="nested-runtime-control" :data-control-id="child.id" :class="[(selectedControlId === child.id ? 'active' : ''), (child.required ? 'required' : '')]" :style="`grid-column: span ${previewColSpan(child)}`" @click.stop="selectControl(child.id)"><div class="resize-row"><div class="resize-handle" title="Drag to resize control width" @mousedown.prevent.stop="startResize(child.id, $event)"></div></div><div class="preview-label" x-text="child.label || child.name"></div><div class="subtle" x-text="child.widget"></div></div></template></div></div></template>
                    <template x-if="control.widget === 'group'"><div class="preview-container preview-group"><div class="subtle">Group Object</div><div class="subtle" x-text="control.groupDescription || 'No group description'"></div><div class="subtle">Data binding: <span x-text="control.name || '(required)'"></span></div><div class="nested-dropzone nested-grid" :data-sortable-source="control.id"><template x-if="!control.children || control.children.length === 0"><div class="subtle">Drop controls into this group</div></template><template x-for="child in (control.children || [])" :key="child.id"><div class="nested-runtime-control" :data-control-id="child.id" :class="[(selectedControlId === child.id ? 'active' : ''), (child.required ? 'required' : '')]" :style="`grid-column: span ${previewColSpan(child)}`" @click.stop="selectControl(child.id)"><div class="resize-row"><div class="resize-handle" title="Drag to resize control width" @mousedown.prevent.stop="startResize(child.id, $event)"></div></div><div class="preview-label" x-text="child.label || child.name"></div><div class="subtle" x-text="child.widget"></div></div></template></div></div></template>
                    <template x-if="control.help"><details class="preview-tooltip help-tooltip" @click.stop><summary aria-label="Show help" title="Show help"><span aria-hidden="true">i</span></summary><div class="subtle" x-html="renderRichText(control.help, control.helpFormat)"></div></details></template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</th:block>
