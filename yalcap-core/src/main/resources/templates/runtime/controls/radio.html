<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="input(control)">
        <div class="runtime-radio-group">
            <label th:each="opt : ${control.renderModel != null ? control.renderModel['options'] : null}" class="runtime-radio-option">
                <input type="radio"
                       th:attr="name=${control.stateKey}, value=${opt['value']}, disabled=${!control.enabled}"
                       th:required="${control.required}" />
                <span th:text="${opt['label']}"></span>
            </label>
        </div>
    </th:block>
</th:block>
