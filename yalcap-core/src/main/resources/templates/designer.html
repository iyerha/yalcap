<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Yalcap Definition Designer</title>
            <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
                integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
                crossorigin="anonymous"></script>
            <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 32px; }
        textarea { width: 100%; min-height: 220px; font-family: monospace; }
        section { margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        pre { background: #f4f4f4; padding: 12px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Yalcap Definition Designer</h1>

    <section>
        <label for="definition-key">Definition key</label>
        <input id="definition-key" name="definitionKey" th:value="${definitionKey}" style="width: 320px; margin-left: 12px;" />
        <button hx-get="/designer/active" hx-trigger="click" hx-target="#active-definition" hx-swap="outerHTML" hx-include="#definition-key">Load active</button>
        <button hx-get="/designer/history" hx-trigger="click" hx-target="#history" hx-swap="outerHTML" hx-include="#definition-key">Load history</button>
    </section>

    <section id="active-definition" hx-get="/designer/active" hx-trigger="load" hx-target="#active-definition" hx-swap="outerHTML" hx-include="#definition-key">
        <div>Loading active definition…</div>
    </section>

    <section id="history" hx-get="/designer/history" hx-trigger="load" hx-target="#history" hx-swap="outerHTML" hx-include="#definition-key">
        <div>Loading definition history…</div>
    </section>

    <section>
        <h2>Publish new definition</h2>
        <form id="publish-form" hx-post="/designer/publish" hx-target="#active-definition" hx-swap="outerHTML" hx-include="#definition-key">
            <input type="hidden" name="definitionKey" th:value="${definitionKey}" id="publish-definition-key" />
            <div>
                <label for="definition-body">Definition JSON</label>
                <textarea id="definition-body" name="definition" placeholder='{"steps": [...]}'></textarea>
            </div>
            <div>
                <label for="created-by">Created by</label>
                <input id="created-by" name="createdBy" value="designer" />
            </div>
            <div>
                <label for="change-message">Change message</label>
                <input id="change-message" name="changeMessage" value="Initial definition publish" style="width: 100%;" />
            </div>
            <button type="submit">Publish definition</button>
        </form>
    </section>
</body>
</html>
